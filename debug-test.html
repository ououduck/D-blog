<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>样式调试测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        paper: '#f2f0e9',
                        ink: '#1c1917',
                        void: '#0a0a0a',
                        accent: '#c0392b'
                    }
                }
            }
        }
    </script>
    <style>
        .text-glow {
            text-shadow: 0 0 15px rgba(192, 57, 43, 0.2);
        }
    </style>
</head>
<body class="bg-paper text-ink dark:bg-void dark:text-gray-200 p-8">
    <h1 class="text-3xl font-bold mb-4">样式调试测试</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-accent text-white p-4 rounded">
            <h2 class="font-bold">红色背景测试</h2>
            <p>如果能看到红色背景，说明 Tailwind 配置正确</p>
        </div>
        
        <div class="border-2 border-ink p-4 rounded">
            <h2 class="font-bold">边框测试</h2>
            <p>如果有深色边框，说明颜色变量正常</p>
        </div>
        
        <div class="bg-white dark:bg-gray-800 p-4 rounded">
            <h2 class="font-bold">深色模式测试</h2>
            <p class="text-glow">发光文字效果测试</p>
            <button onclick="document.documentElement.classList.toggle('dark')" class="mt-2 px-4 py-2 bg-accent text-white rounded">
                切换深色模式
            </button>
        </div>
        
        <div class="p-4">
            <h2 class="font-bold">字体测试</h2>
            <p class="font-serif">Serif 字体测试</p>
            <p class="font-sans">Sans 字体测试</p>
        </div>
    </div>
    
    <div class="mt-8 p-4 bg-yellow-100 border-l-4 border-yellow-500">
        <h3 class="font-bold text-yellow-800">调试信息：</h3>
        <p class="text-yellow-700">如果以上测试都正常显示，说明 Tailwind CSS 配置没有问题。</p>
        <p class="text-yellow-700">如果样式不显示，请检查网络面板中的 CSS 文件加载情况。</p>
    </div>
</body>
</html>
