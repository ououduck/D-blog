name: Notify Blog Post Update

on:
  push:
    branches: [main]
    paths:
      - 'posts/**/*.md'
  workflow_dispatch:
    inputs:
      post_files:
        description: 'Markdown paths to notify, separated by new lines'
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Post article notification
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          MANUAL_POST_FILES: ${{ inputs.post_files }}
          ISSUE_NUMBER: ${{ vars.BLOG_NOTIFY_ISSUE_NUMBER || '6' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const childProcess = require('child_process');
            const fs = require('fs');

            function getChangedFiles() {
              if (context.eventName === 'workflow_dispatch') {
                return (process.env.MANUAL_POST_FILES || '').split(/\r?\n/).map((file) => file.trim()).filter(Boolean);
              }

              const beforeSha = process.env.BEFORE_SHA;
              const afterSha = process.env.AFTER_SHA;
              const args = beforeSha === '0000000000000000000000000000000000000000'
                ? ['show', '--pretty=', '--name-only', afterSha, '--', 'posts/**/*.md']
                : ['diff', '--name-only', '--diff-filter=AM', beforeSha, afterSha, '--', 'posts/**/*.md'];

              return childProcess.execFileSync('git', args, { encoding: 'utf8' }).split(/\r?\n/).map((file) => file.trim()).filter(Boolean);
            }

            function getFrontmatter(content) {
              const match = content.match(/^---\s*\r?\n([\s\S]*?)\r?\n---/);
              if (!match) return {};

              return Object.fromEntries(
                match[1]
                  .split(/\r?\n/)
                  .filter((line) => /^([\w-]+):\s*/.test(line))
                  .map((line) => {
                    const separator = line.indexOf(':');
                    return [line.slice(0, separator).trim(), line.slice(separator + 1).trim().replace(/^['"]|['"]$/g, '')];
                  }),
              );
            }

            const changedFiles = getChangedFiles();
            core.info(`Changed post files: ${changedFiles.join(', ') || 'none'}`);

            const posts = changedFiles.flatMap((file) => {
              if (!fs.existsSync(file)) {
                core.warning(`Skipping ${file}: file does not exist in this workflow checkout.`);
                return [];
              }

              const content = fs.readFileSync(file, 'utf8');
              const frontmatter = getFrontmatter(content);

              if (frontmatter.draft === 'true') {
                core.info(`Skipping draft: ${file}`);
                return [];
              }

              if (!frontmatter.id) {
                const fallbackId = file.replace(/^posts\//, '').replace(/\.md$/, '');
                core.warning(`Missing id front matter in ${file}; using filename fallback: ${fallbackId}.`);
                frontmatter.id = fallbackId;
              }

              return [{
                title: frontmatter.title || frontmatter.id,
                excerpt: frontmatter.excerpt,
                date: frontmatter.date,
                url: `https://blog.pldduck.com/post/${encodeURIComponent(frontmatter.id)}`,
              }];
            });

            if (posts.length === 0) {
              core.setFailed(`No published posts to notify. Changed files: ${changedFiles.join(', ') || 'none'}.`);
              return;
            }

            const commit = context.payload.head_commit;
            let body = '## D-blog has new article updates\n\n';

            for (const post of posts) {
              body += `### [${post.title}](${post.url})\n\n`;
              if (post.excerpt) body += `${post.excerpt}\n\n`;
              if (post.date) body += `Published: ${post.date}\n\n`;
            }

            if (commit) {
              body += `Commit: [${commit.id.slice(0, 7)}](${commit.url}) - ${commit.message.split('\n')[0]}\n\n`;
            }
            body += '---\n*This notification was posted automatically by GitHub Actions.*\n';

            const result = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body,
            });

            core.info(`Notification posted: ${result.data.html_url}`);
