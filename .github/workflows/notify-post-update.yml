name: Notify Blog Post Update

on:
  push:
    branches: [main]
    paths:
      - 'posts/**/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed posts
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git show --pretty='' --name-only "$AFTER_SHA" -- 'posts/**/*.md')
          else
            CHANGED=$(git diff --name-only --diff-filter=AM "$BEFORE_SHA" "$AFTER_SHA" -- 'posts/**/*.md')
          fi

          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has_changes=true"
            echo "files<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check notification cooldown
        id: cooldown
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          NOW=$(date +%s)
          LAST=0

          if [ -f .github/blog-notify-state.json ]; then
            LAST=$(node -p "require('./.github/blog-notify-state.json').lastNotifiedAt || 0" 2>/dev/null || echo 0)
          fi

          if [ $((NOW - LAST)) -lt 1800 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Notification cooldown is active."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post article notification
        id: notify
        if: steps.changed.outputs.has_changes == 'true' && steps.cooldown.outputs.skip == 'false' && vars.BLOG_NOTIFY_ISSUE_NUMBER != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          ISSUE_NUMBER: ${{ vars.BLOG_NOTIFY_ISSUE_NUMBER }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const changedFiles = process.env.CHANGED_FILES.split(/\r?\n/).filter(Boolean);
            const posts = [];

            function getFrontmatter(content) {
              const match = content.match(/^---\s*\r?\n([\s\S]*?)\r?\n---/);
              if (!match) return {};

              return Object.fromEntries(
                match[1]
                  .split(/\r?\n/)
                  .filter((line) => /^([\w-]+):\s*/.test(line))
                  .map((line) => {
                    const separator = line.indexOf(':');
                    const key = line.slice(0, separator).trim();
                    const value = line.slice(separator + 1).trim().replace(/^['"]|['"]$/g, '');
                    return [key, value];
                  }),
              );
            }

            function getPreview(content) {
              const body = content.replace(/^---\s*\r?\n[\s\S]*?\r?\n---\s*/u, '');
              const plainText = body
                .replace(/!\[[^\]]*\]\([^)]*\)/g, '')
                .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')
                .replace(/```[\s\S]*?```/g, '')
                .replace(/[#*_~`>|-]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
              return plainText.length > 120 ? `${plainText.slice(0, 120)}...` : plainText;
            }

            for (const file of changedFiles) {
              if (!fs.existsSync(file)) continue;
              const content = fs.readFileSync(file, 'utf8');
              const frontmatter = getFrontmatter(content);
              if (frontmatter.draft === 'true') continue;

              const id = frontmatter.id;
              if (!id) {
                core.warning(`Skipping ${file}: missing required id front matter.`);
                continue;
              }

              posts.push({
                title: frontmatter.title || id,
                excerpt: frontmatter.excerpt || getPreview(content),
                date: frontmatter.date,
                url: `https://blog.pldduck.com/post/${encodeURIComponent(id)}`,
              });
            }

            if (posts.length === 0) {
              core.notice('No published posts to notify.');
              core.setOutput('posted', 'false');
              return;
            }

            const commit = context.payload.head_commit;
            const timestamp = new Date().toISOString().replace('T', ' ').replace(/\.\d{3}Z$/, ' UTC');
            let body = '## D-blog has new article updates\n\n';

            for (const post of posts) {
              body += `### [${post.title}](${post.url})\n\n`;
              if (post.excerpt) body += `${post.excerpt}\n\n`;
              if (post.date) body += `Published: ${post.date}\n\n`;
            }

            body += `Updated: ${timestamp}\n`;
            body += `Commit: [${commit.id.slice(0, 7)}](${commit.url}) - ${commit.message.split('\n')[0]}\n\n`;
            body += '---\n*This notification was posted automatically by GitHub Actions.*\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body,
            });
            core.setOutput('posted', 'true');

      - name: Save notification timestamp
        if: steps.notify.outputs.posted == 'true'
        run: |
          printf '{"lastNotifiedAt": %s}\n' "$(date +%s)" > .github/blog-notify-state.json
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .github/blog-notify-state.json
          git commit -m "chore: update blog notification cooldown [skip ci]"
          git push

      - name: Explain missing configuration
        if: steps.changed.outputs.has_changes == 'true' && vars.BLOG_NOTIFY_ISSUE_NUMBER == ''
        run: |
          echo "Set the BLOG_NOTIFY_ISSUE_NUMBER repository variable to the Issue number that should receive notifications."
