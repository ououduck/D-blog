<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D-blog</title>
    <meta name="description" content="跑路的duck的技术分享和生活随笔" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- clarity -->
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "v9s22psrcc");
    </script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              serif: ['"Playfair Display"', 'serif'],
            },
            colors: {
              paper: '#f2f0e9',
              ink: '#1c1917',
              void: '#0a0a0a',
              accent: {
                DEFAULT: '#c0392b',
                light: '#e74c3c',
                dark: '#922b21'
              }
            },
            animation: {
              'float': 'float 12s ease-in-out infinite',
              'grain': 'grain 8s steps(10) infinite',
              'shimmer': 'shimmer 3s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0) rotate(0)' },
                '50%': { transform: 'translateY(-30px) rotate(1deg)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              grain: {
                '0%, 100%': { transform: 'translate(0, 0)' },
                '10%': { transform: 'translate(-2%, -5%)' },
                '20%': { transform: 'translate(-8%, 2%)' },
                '30%': { transform: 'translate(4%, -10%)' },
                '40%': { transform: 'translate(-2%, 8%)' },
                '50%': { transform: 'translate(-8%, 4%)' },
                '60%': { transform: 'translate(6%, 0%)' },
                '70%': { transform: 'translate(0%, 6%)' },
                '80%': { transform: 'translate(2%, 12%)' },
                '90%': { transform: 'translate(-4%, 4%)' },
              }
            },
            typography: (theme) => ({
              DEFAULT: {
                css: {
                  fontFamily: '"Plus Jakarta Sans", sans-serif',
                  color: theme('colors.ink'),
                  h1: { fontFamily: '"Playfair Display", serif', fontWeight: '800' },
                  h2: { fontFamily: '"Playfair Display", serif', fontWeight: '700' },
                  h3: { fontFamily: '"Playfair Display", serif', fontWeight: '600' },
                  strong: { color: theme('colors.accent.DEFAULT') },
                },
              },
              invert: {
                css: {
                  color: '#e5e5e5',
                  strong: { color: theme('colors.accent.light') },
                }
              }
            }),
          }
        }
      }
    </script>
    <style>
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
      }
      
      /* Noise texture overlay */
      .bg-noise {
        position: fixed;
        top: -50%;
        left: -50%;
        right: -50%;
        bottom: -50%;
        width: 200%;
        height: 200vh;
        background: transparent url('http://assets.iceable.com/img/noise-transparent.png') repeat 0 0;
        background-repeat: repeat;
        animation: grain 8s steps(10) infinite;
        opacity: 0.02;
        z-index: 9999;
        pointer-events: none;
      }
      .dark .bg-noise {
        opacity: 0.04;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(168, 162, 158, 0.5); 
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(64, 64, 64, 0.5); 
      }
      
      /* Premium text effects */
      .text-glow {
        text-shadow: 0 0 15px rgba(192, 57, 43, 0.2);
      }
      
      /* Layout optimization */
      body {
        cursor: default;
      }

      /* Better focus states */
      :focus-visible {
        outline: 2px solid #c0392b;
        outline-offset: 4px;
      }

      .no-scrollbar::-webkit-scrollbar {
    display: none;
  }
  .no-scrollbar {
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
  }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.29.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-paper text-ink dark:bg-void dark:text-gray-200 transition-colors duration-1000 ease-in-out overflow-x-hidden">
    <div class="bg-noise"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
