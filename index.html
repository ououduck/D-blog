<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D-blog</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <meta name="description" content="跑路的duck的技术分享和生活随笔" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f4" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />

    <!-- DNS 预解析和预连接优化 -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- 预加载关键资源 -->
    <link rel="modulepreload" href="/src/index.tsx">
    <link rel="preload" href="/generated/posts.json" as="fetch" crossorigin="anonymous">

    <!-- 字体加载优化：使用 display=swap 避免阻塞渲染 -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    </noscript>
</head>
  <body class="bg-paper text-ink dark:bg-void dark:text-gray-200 transition-colors duration-1000 ease-in-out overflow-x-hidden">
    <div class="bg-noise"></div>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
