<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D-blog | 离线中</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(192, 57, 43, 0.16), transparent 35%),
          linear-gradient(180deg, #fafaf9, #f4f4f5);
        color: #18181b;
      }

      .card {
        width: min(92vw, 34rem);
        padding: 2rem;
        border-radius: 1.5rem;
        border: 1px solid rgba(24, 24, 27, 0.08);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 80px rgba(24, 24, 27, 0.08);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 5vw, 3rem);
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #52525b;
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 1.5rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.85rem 1.1rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .primary {
        background: #18181b;
        color: #fff;
      }

      .secondary {
        border: 1px solid rgba(24, 24, 27, 0.12);
        color: #18181b;
        background: rgba(255, 255, 255, 0.7);
      }

      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(circle at top, rgba(251, 146, 60, 0.14), transparent 35%),
            linear-gradient(180deg, #09090b, #18181b);
          color: #f4f4f5;
        }

        .card {
          border-color: rgba(255, 255, 255, 0.08);
          background: rgba(24, 24, 27, 0.82);
          box-shadow: none;
        }

        p {
          color: #a1a1aa;
        }

        .primary {
          background: #f4f4f5;
          color: #09090b;
        }

        .secondary {
          border-color: rgba(255, 255, 255, 0.12);
          color: #f4f4f5;
          background: rgba(39, 39, 42, 0.88);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>当前处于离线状态</h1>
      <p>已访问过的文章和页面仍可继续阅读。未缓存的页面暂时无法打开，恢复网络后会自动更新。</p>
      <div class="actions">
        <a class="primary" href="/">返回首页</a>
        <a class="secondary" href="/feed.xml">查看 RSS</a>
      </div>
    </main>
  </body>
</html>
